body:
  text: 東鼎湖山沙門釋弘贊在犙輯受五戒法梵志復白佛言世尊以賜三自歸法天帝遣善神三十六大王護助我身已蒙世尊哀愍救度今更頂禮請受戒法佛言善哉梵志汝當淨身口意懇惻至心敬受戒法十方三世如來至真等正覺皆由三歸五戒得之梵志盡形壽不殺生不教他殺是戒能持不若能持者有五神王隨逐護汝身不令邪神惡鬼之所得便梵志盡形壽不盜他人財寶不教他行盜是戒能持不若能持者有五善神王隨逐護汝身梵志盡形壽不邪婬是戒能持不若能持者有五神王隨逐護汝身眾魔皆不得便梵志盡形壽不妄言綺語兩舌鬬亂是戒能持不若能持者有五神王隨逐護汝身梵志盡形壽不飲穀酒蔗酒蒲萄酒能放逸酒如是酒皆不得飲是戒能持不若能持者有五善神隨逐護汝身梵志是為三歸五戒法也汝善持之勿有毀犯優婆塞戒經云善男子優婆塞戒極為甚難何以故是戒能為沙彌戒大比丘戒及菩薩戒乃至無上菩提而作根本至心受持優婆塞戒則能獲得如是等戒無量利益若有毀破如是戒者則於無量無邊世中處三惡道受大苦惱汝今欲得無量利益能志心受不若言能者復應語言若歸佛已寧捨身命終不依於自在天等若歸法已寧捨身命終不依於外道典籍若歸僧已寧捨身命終不依於外道邪眾善男子如來說優婆塞或有一分或有少分或有無分或有多分或有滿分若優婆塞受三歸已不受五戒是名優婆塞若受三歸受持一戒是名一分受三歸已受持二戒是名少分若受三歸受持二戒已若破一戒是名無分若受三歸受持四戒是名多分若受三歸受持五戒是名滿分故智度論云戒有五種始從不殺終至不飲酒若受一戒名一分優婆塞若受二戒名少分優婆塞若受三戒名半分優婆塞若受四戒名多分優婆塞若受五戒名滿分優婆塞汝今欲受何分當隨意說爾時智者當隨其意授灌頂經梵志白佛言若男子女人欲受歸戒者當云何授與佛言若人欲受先禮十方佛長跪合掌作如是言我弟子某甲盡形壽受三歸五戒諸佛菩薩賢聖僧眾哀念我等智度論云先受三歸後始懺悔此謂翻邪三歸若久來信佛不須先受三歸但依五戒八戒三歸先懺悔已後受三歸然後說戒相懺文如後八戒法中出應先令修威儀禮敬已在戒師前胡跪合掌教作如是言我某甲歸依佛歸依法歸依僧盡形壽為滿分優婆塞受一戒應言一分若受二三四戒隨分言之如來至真等正覺是我世尊三說已次授三結我某甲歸依佛竟歸依法竟歸依僧竟盡形壽為滿分優婆塞如來至真等正覺是我世尊三說若善女人當云優婆夷前三歸依第三遍訖即發五戒後三結是直付囑之次示戒相令識持犯故大方便經云若受五戒先受三歸三歸既竟乃得五戒所以說五戒名者欲使前人識五戒名字應告彼言今當示汝戒相汝應諦聽受之盡形壽不殺生是優婆塞夷戒能持不能者當答言能持下准此盡形壽不偷盜是優婆塞夷戒能持不盡形壽不邪婬是優婆塞夷戒能持不盡形壽不妄語是優婆塞夷戒能持不盡形壽不飲酒是優婆塞夷戒能持不智度論云既說戒相已復應語言是優婆塞五戒盡形壽持當供養三寶勤修福德進求修道若斷婬者受五戒已於戒師前更作誓言從今日於自夫婦不復作婬大方便經優波離白佛言若受一日二日乃至十日五戒得受不佛言不得佛本制戒各有限齊若受五戒必盡形壽若受八戒必一日一夜受是故不得根本羯磨云授與三歸并五學處成鄔波索迦律儀護言護者梵語三䟦羅此譯為擁護由受歸戒護使不落三塗舊云律儀乃當義譯云是律法儀式若但云護恐學者未詳故兩俱存即是戒體無表色也故薩婆多論云以三寶為所歸欲令救護不得侵凌故也言五學處即五戒鄔波索迦即優婆塞乃梵音前後不同耳此譯為近事男亦云親近男或言離惡修善謂受此戒方能親近承事佛法僧三寶斷諸惡法而修眾善也優婆塞戒經佛言若受戒已當知是人為諸人天恭敬守護得大名稱雖遭惡對心無愁惱眾生親附樂來依止阿那邠坻長者子雖為八千金錢受戒亦得無量功德果報為財受戒尚得利益況有至心為於解脫而當不得耶大灌頂經佛告執持長者天帝所遣歸戒之神凡有億億恒沙之數諸鬼神王番代擁護不令衰耗諸天歡喜皆言善哉當共護之如是持戒若完具者十方現在無量諸佛菩薩羅漢皆共稱讚是清信士女臨命終時佛皆分身而來迎之不使持戒男女墮惡道中若戒羸者當益作福德布施持戒忍辱精進一心智慧然燈燒香散華懸繒旛葢歌詠讚歎三寶恭敬禮拜益持齋戒亦得過度若不能如上修行功德復持戒不完向諸邪道求覓福祐恒沙歸戒神王各去離之惡鬼數來嬈近之也戒羸者無力持戒也如消災經說舍衛國有一縣皆奉行五戒十善無釀酒者中有一大姓家子欲遠賈販臨行父母語言勤持五戒十善慎莫飲酒犯佛重戒受教而行到他國已見故親友再三逼令飲酒事不獲己飲之事訖還家具告於親父母言汝違吾教加復犯戒為國作先亂法之漸非孝子也便以販物逐令出國既到他國住客舍家主人事三鬼神現形語言飲食主人事之積年疲勞患厭此鬼鬼知人意盜他寶物來與主人主人得寶設食祭之鬼來詣門見舍衛國人在舍奔走而去主人追呼請還鬼曰卿舍尊客吾焉得前重復驚走主人還歸問曰卿有何功德致吾所事神畏子而走客具說佛五戒十善實犯酒戒為親所逐向餘四戒故為天神所護卿神不敢當之主人因從客受三歸五戒十善問佛所在可得見不客曰佛在舍衛往立可見主人一心往彼路經一亭中有一女是噉人鬼婦時日逼暮從女寄宿女言慎勿留此宜急前去男子自念我已受三歸五戒十善心不懈怠何畏懼乎遂自留宿噉人鬼見護戒神徘徊其傍去亭四十里一宿不歸明日男子進路見鬼所噉人骨狼藉心怖悔還惡念便生欲還將女歸家共住即回亭所復從女求宿女言卿死矣吾夫是噉人鬼不久來還男子不信婬意復生不復信佛三歸之德五戒十善之心天神即去無復護之鬼得來還女人恐鬼食此男子哀愍藏之甕中鬼聞人氣問婦曰汝得肉耶吾欲噉之婦曰我不行何從得肉卿昨何以不歸鬼言正為汝宿佛弟子天神逐我出四十里外露宿震怖於今不安復不得肉食婦聞默喜因問夫曰佛戒云何鬼言急以肉來不須問此此是無上正真之戒非吾所敢說也婦言為我說之當與卿肉鬼類貪殘因為說三歸五戒婦輙受之心執口誦男子甕中復識五戒隨言受之天帝知此二人心自歸佛即選善神五十擁護二人鬼遂走去婦問男子怖乎答曰大怖蒙仁者恩心悟識佛婦言吾本良家之女為鬼所掠今蒙仁恩得聞佛戒得離此鬼賢者今欲何往男子曰吾欲到舍衛見佛婦言善哉吾至本國與父母隨賢者見佛便俱前行路逢四百九十八人因相問訊諸賢何來答曰從佛所來佛日說經意中罔罔心不能解今還本國二人具說鬼所畏戒本末因緣諸人意乃開解俱還見佛佛遙見之告阿難言此四百九十八人今得其本師來見佛者皆當得道五百人至為佛作禮一心聽經心開意解皆作沙門得阿羅漢佛言犯酒戒者則是客舍主人與女人累世兄弟也然此二人是四百九十八人前世之師凡人求道要當得其本師及其善友乃可解耳雖犯酒戒元非性罪況其十善猶全故得天神營護若於四重戒中而破其一必無天神衛護又況無其十善之德也報恩經云若破五戒中重戒而受八戒十戒大戒禪戒無漏戒一切不得若破五戒已欲捨五戒更受十戒者無有是處若破五戒更受五戒亦無是處言五戒中重戒者謂盜五錢三處行婬殺人自言得聖人法隨犯一戒即名犯重不通懺悔或遇破戒惡緣不能持者寧捨已乃作後更得受四分律云若有捨戒者於佛法為死受生則難趣死極易捨時無問出家在家人但對一人言我先受五戒為優婆塞今捨却作在家白衣一說便成捨法界次第云破此五戒則非清信士女故提謂經云五戒者天下大禁忌若犯五戒在天則違五星在地則違五嶽在方則違五帝在身則違五藏如是等世間違犯無量若約出世犯五戒者則破五分法身及一切佛法所以者何五戒是一切大小乘尸羅根本若犯五戒則不得更受大小乘戒也若能堅持即是五大施故佛言一切施中施無畏最為第一是故我說五大施者即是五戒如是五戒能令眾生離五怖畏是五種施易可修行自在無礙不失財物能得無量無邊福德離是五施不能獲得須陀洹果乃至阿耨多羅三藐三菩提此五通名戒者以防止為義能防惡律儀無作之非止三業所起之惡故名防止經云何因緣故得名為戒戒者名制能制一切不善法故又名曰迮隘雖有惡法性不容故又名曰清涼遮煩惱熱不能得入故又名曰上能上天上至無上道故又名曰學調伏心智慧諸根故故論云此五戒應名學迹若有遊此便昇無上智慧殿故如尊者阿那律告諸比丘我依戒住戒戒為梯隥已能昇陟無上慧殿汝眾等應學勿生放逸又此五應名學基於涅槃城而作基址故今此五戒前四是性後一是遮性戒者持之性自是善犯之性自是惡不由佛遮制方有善惡故性戒受與不受作之俱是罪不同其餘遮制等戒如比丘受草木戒已犯之得罪俗眾不受犯不得罪故輪王出世以此性法化人若受佛戒之後犯於殺等則更加違制之罪若受不殺戒者乃至一切有形蠢動含靈皆不得加害及襍肉葷辛並不得犯若俗家井水多有微細諸蟲須絹濾已將蟲還置本處欲出行時應帶濾囊自隨或以眼觀無蟲方可飲用若受不盜戒者下至一鍼一草一米一穀等不與不得自取若受不邪婬戒者如智論云除己妻外餘諸男女鬼神畜生可得婬者悉是邪婬雖是自妻不犯然須避於非處謂非道及得妊已亦禁之恐傷胎故非道謂口及大便餘身分也若受不妄語戒者但使心虗無問境之虗實並犯此有大小自言證聖得上人法得禪得定得三昧解脫等名大妄語犯不可悔其餘見言不見不見言見及兩舌惡口綺語犯可悔若受不飲酒戒者一切能醉人之酒乃至不得以草頭滴著口中酒是放逸根本能犯四戒如大方便經云昔迦葉佛時有優婆塞由飲酒故盜他雞殺婬他妻他人來問時答言不作便犯妄語亦能造四逆唯不能破僧毗婆沙論云有一鄔波索迦稟性仁賢受持五戒專精不犯後於一時為渴所逼見一器中有酒如水遂取飲之爾時便犯酒戒時有鄰雞來入其舍盜殺而噉復犯殺盜二戒鄰女尋雞來入其室強逼交通復犯邪行戒鄰家告官訊問拒諱復犯誑語戒如是五戒皆由酒犯沙彌尼戒經云不得飲酒不得嗜酒不得甞酒酒有三十六失失道破家危身喪命皆悉由之牽東引西持南著北不能諷經不敬三寶輕易師友不孝父母心閉意塞世世愚癡不值大道其心無識故不飲酒欲離五陰五欲五葢得五神通得度五道故不飲酒薩遮尼乾子經偈云飲酒多放逸現世常愚癡忘失一切事常被智者呵來世常闇鈍多失諸功德是故黠慧人離諸飲酒失一切食中不得著酒正法念經閻羅王數責罪人說偈云酒能亂人心令人如羊等不知作不作如是應捨酒若酒醉之人如死人無異若欲常不死彼人應捨酒酒是諸過處恒常不饒益一切惡道階黑闇所在處飲酒到地獄亦到餓鬼界行於畜生業是酒過所誑酒為毒中毒地獄中地獄病中之大病是智者所說若人飲酒者無因緣歡喜無因緣而瞋無因緣作惡於佛所生癡壞世出世事燒解脫如火所謂酒一法若人能捨酒正行於法戒彼到第一處無死無生處優婆塞戒經云或言更有無量極重之法過去諸佛何緣不制而制於酒善男子因於飲酒慚愧心壞於三惡道不生怖畏以是因緣則不能受餘四戒是故過去諸佛制不聽飲或言如來已說酒多過失何故不在五戒初說是義不然何以故如是酒戒名為遮重不名性重如來先制性重之戒後制遮重又如來了了知諸法性是故制之優婆塞五戒相經云佛告諸比丘犯殺有三種奪人命一自作二教人三遣使自作者自身作奪他命教人者語他人言捉是人繫縛奪命遣使者語他言汝識某甲不汝捉是人繫縛奪命是使隨語奪彼命時優婆塞犯不可悔罪復有三種一用內色二用非內色三用內非內色第一用內色殺者謂用手打若用足及餘身分令彼死是犯不可悔罪若不即死後因是死亦犯不可悔若後不因死是中罪可悔第二用非內色殺者若人以木石刀矟弓箭等令彼死者同前得罪第三用內非內色殺者以手捉木石等打令死者得罪同前復有不以此三殺但合諸毒藥著眼耳鼻舌身上食中被褥等中令彼死者亦同前罪若優婆塞或作火坑漫心造者若人墮死犯不可悔非人鬼神墮中死者犯中罪可悔畜生死者犯下罪可悔若都無死者犯三方便可悔輕罪若尅心唯為人造火坑不通餘者若人墮死犯不可悔不死犯方便非人畜生死者不犯若優婆塞或用口業呪術令死或有歎死讚死或有氣力人心起惡念令死或墮胎令死得罪輕重並同前准不犯者或有行來出入悞墮木石等死者並不犯餘如經說第二盜戒者以三種取他重物犯不可悔一用心二用身三離本處第一用心者謂發心思惟欲為偷盜第二用身者謂用身分等取他物第三離本處者隨物在處舉著餘處並得重罪復有三種取人重物犯不可悔罪一自取二教他取三遣使取復有五種取他重物犯不可悔一苦切取二輕慢取三詐稱他名字取四強奪取五受寄取重物者若盜五錢若五錢直得者犯不可悔罪復有七種取他物犯不可悔一非己想二不同意三不暫用四知有主五不狂六不心亂七不病壞心具此七者取他重物犯不可悔取他不滿五錢輕物犯中可悔翻前七種取他物者重輕皆不犯第三邪婬戒者邪婬有四處一男二女三黃門四二根女者人女非人女畜生女男者人男非人男畜生男黃門二根各有三種同前若優婆塞與人女非人女畜生女三處行婬謂口大小便處犯不可悔若人男非人男畜生男黃門二根二處行婬謂口及大便處犯不可悔若發心未行婬未和合者犯小可悔罪若二身和合止而不婬犯中可悔除此三處餘處行婬皆可悔若人死及畜生死者身根未壞於彼三處行婬犯不可悔輕處同上若人雖不受戒犯佛弟子淨戒人者雖無犯戒之罪後永不得受五戒八戒乃至出家具足戒若顛狂心亂痛惱所纏不自覺者不犯佛告諸比丘吾有二身一生身二戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量受罪如伊羅鉢龍王犯不可悔也犯淨戒人罪同五逆以惡業重障於聖道故不聽出家第四妄語戒者佛告諸比丘吾以種種呵責妄語讚歎不妄語者乃至戲笑尚不應妄語何況故妄語是中犯者若優婆塞不知不見過人聖法自言我是阿羅漢四等果人乃至四禪慈悲喜捨得四空定不淨觀阿那般那念天來龍來到我所供養我彼問我義我答彼問皆犯不可悔罪若實見言不見實聞言不聞實疑言不疑有而言無無而言有如是等小妄語者犯可悔罪若發心欲妄語未出言犯下可悔言而不盡意者犯中可悔若自言得聖道者便犯不可悔若狂心亂心不覺語者不犯未曾有經云佛告祇陀太子曰妄語有二一重二輕為供養故外現精進內行邪濁向人妄語得禪境界或言見佛見龍見鬼如是之人名大妄語犯是罪者墮阿鼻獄又復妄語能令殺人破壞人家復有妄語違失期契令他瞋恨如是名為下妄語墮小地獄其餘戲笑及諸理匿禁之事或有言無或無言有不犯戒也第五酒戒者佛告諸比丘若言我是佛弟子者不得飲酒乃至小草頭一滴亦不得飲酒有二種穀酒木酒穀酒者以諸五穀襍米作酒者是木酒者或用根莖木葉果用種種子諸藥草襍作酒者是酒色酒香酒味飲能醉人者是名為酒若甞咽者亦名為飲若飲穀酒咽咽犯若飲酢酒若飲甜酒若噉能醉人者若噉糟若飲酒澱若飲似酒酒色酒香酒味能令人醉者並隨咽咽犯若但作酒色無酒香無酒味不能醉人及餘飲者皆不犯若依四分律病比丘等餘藥治不差以酒為藥者不犯顛狂心亂痛惱不覺知者不犯優婆塞戒經佛言一切眾生因殺生故現在獲得惡色惡力惡名短命財物耗減眷屬分離賢聖訶責人不信用他人作罪橫罹其殃是名現在惡業之果捨此身已當墮地獄多受苦惱饑渴長命惡色惡力惡名等事是名後世惡業之果若得人身復受惡色短命貧窮是惡人因緣力故令外一切五穀果蓏悉皆減少是人殃流及一天下善男子若人樂偷是人亦得惡色惡力惡名短命財物耗減眷屬分離他人失物於己生疑雖親附人人不見信常為賢聖之所訶責是名現在惡業之果捨此身已墮於地獄受得惡色惡力惡名饑渴苦惱壽命長遠是名後世惡業之果若得人身貧於財物雖得隨失不為父母兄弟妻子之所愛念身常受苦心懷愁惱是一惡人因緣力故一切人民凡所食噉不得色力是人惡果殃流萬姓善男子若復有人樂於妄語是人現得惡口惡色所言雖實人不信受眾皆憎惡不喜見之是名現世惡業之報捨此身已入於地獄受大苦楚饑渴熱惱是名後世惡業之報若得人身口不具足所說雖實人不信受見者不樂雖說正法人不樂聞是一惡人因緣力故一切外物資產減少善男子若復有人樂飲酒者是人現世喜失財物身心病多常樂鬬諍惡名遠聞喪失智慧心無慚愧得惡色力常為一切之所呵責人不喜見不能修善是名飲酒現在惡報捨此身已處在地獄受饑渴等無量苦惱是名後世惡業之果若得人身心常狂亂不能繫念思惟善法是一惡人因緣力故一切外物資產臰爛善男子若復有人樂為邪婬是人不能護自他身一切眾生見皆生疑所作之事妄語在先於一切時常受苦惱心常散亂不能修善喜失財物所有妻子心不戀慕壽命短促是名邪婬現在惡果捨此身已處在地獄受惡色力饑渴長命無量苦惱是名後世惡業果報若得人身惡色惡口人不喜見不能守護妻妾男女是一惡人因緣力故一切外物不得自在善男子受優婆塞戒有五處所不應遊屠兒婬女酒肆國王旃陀羅舍善男子受優婆塞戒有五事所不應作一者不賣生命二者不賣刀劒三者不賣毒藥四者不沽酒五者不壓油外國麻中有蟲故犯此方無蟲應不犯善男子受優婆塞戒復有三事所不應為一者不得作羅網二者不得作藍染外國染五大色多殺蟲故此方染青亦多殺蟲入五大色數三者不得釀皮善男子受優婆塞戒復有二事不應為一者樗蒲圍碁六博二者種種歌舞妓樂善男子受優婆塞戒有四種人不應親近一者棊博二者飲酒三者欺誑四者酤酒善男子受優婆塞戒有法放逸所不應作何等放逸寒時熱時饑時渴時多食飽時清旦暮時懅時作時初欲作時失時怖時喜時賊難穀貴時病苦少壯年衰老時富時貧時為命財時如是時中不修善法汝能離不善男子受優婆塞戒先學世事既學通達如法求財若得財物作四分一分應供父母己身妻子眷屬二分應作如法販轉留餘一分藏積自用作福善男子財物不應寄附四處一者老人二者遠處三者惡人四者大力如是四處不應寄附善男子受優婆塞戒有四惡人常應離之一者樂說他過二者樂說邪見三者口輭心惡四者少作多說如是戒者亦名初地亦名導地亦名平地亦名等地亦名慈地亦名悲地亦名佛跡亦名一切功德根本亦名福田以是因緣智者應當受持不毀復次戒有二果一諸天樂二菩提樂智者應當求菩提樂不求諸天樂智度論云有三品持戒若下持戒生人中中持戒生六欲天中上持戒又修四禪四空定生色無色界天中上持戒有三種下清淨持戒得阿羅漢中清淨持戒得辟支佛上清淨持戒得佛道不著不倚不破不缺聖所讚愛是為上清淨持戒若人求大善利當堅持戒如惜重寶如護身命何以故譬如大地一切萬物皆依地而住戒亦如是為一切善法住處又如無足欲行無翅欲飛無船欲度是不可得若無戒欲求好果亦復如是若人棄捨此戒雖居山苦行食果服藥與禽獸無異梵網經佛言不受佛戒名為畜生生生之處不見三寶如木石無心名為外道邪見人輩木頭無異故經云一切功德助道之行舉要言之以戒為本持戒為始以戒淨故不斷佛種成等正覺不斷法種分別法性不斷僧種修無為道以持淨戒相續不斷故優婆塞戒經云若至心能受持如是戒者是人名為優婆塞中分陀利華優婆塞中微妙上香優婆塞中清淨蓮華優婆塞中真實珍寶優婆塞中大丈夫人善男子如佛所說菩薩二種一者在家二者出家出家菩薩名為比丘在家菩薩名為優婆塞出家菩薩持出家戒是不為難在家菩薩持在家戒是乃為難何以故在家之人多惡因緣所纏繞故今此五戒必從有德明師稟受方乃得戒若師不明不能指示止持作犯出世之要故須授受當依法教如分別經云阿難問佛若時無明師傳教戒者若有一人書寫戒律授與之便可得度為道者不佛言皆當得知禁法者乃可授戒不可以文字受便為應法何以故佛為天上天下之大智不可妄傳失旨皆當明於戒法禁律事事委練乃為相授不明戒法禁要之事而妄授人戒法違佛戒信反用為是罪不小也猘狗經云佛語阿難後末世時有弟子作師懶墯無有智慧不精佛法欲得人供養行授人戒法是為賣戒阿諛隨人見人貪殺不與誡見人嗜酒不斷酒謂多少可飲如是教者持人著泥犁中阿難問佛新發意者值遇惡師不曉不了謂法當爾至使信受其言愚癡不解更見名師為可復重受戒不佛言於我法中曠大極可得悔更自懺洗初發意時心常冥為惡師所誤實自不知更行受戒始為入法不知不曉時非佛弟子為是世間少善人耳無有大功德善生長者白佛言世尊菩薩已受優婆塞戒復當云何供養三寶佛言善男子世間福田凡有三種一報恩田二功德田三貧窮田報恩田者所謂父母師長和尚功德田者從得煖法乃至得阿耨多羅三藐三菩提貧窮田者一切窮苦困厄之人如來世尊是二種田一報恩田二功德田法亦如是是二種田眾僧三種一報恩田二功德田三貧窮田以是因緣菩薩已受優婆塞戒當至心勤供養三寶善男子如來即是一切法藏是故智者應當至心勤心供養生身滅身形儀塔廟若於曠野無塔廟處常當繫念尊重讚歎若自力作若勸人作見人作時心生歡喜如其自有功德力者要多廣教眾多之人而共作之既供養已於己身中莫生輕想於三寶所亦應如是凡所供養不使人作不為勝他作時不悔心不愁惱合掌讚歎恭敬尊重若以一錢至無量寶若以一線至無量線若以一華至無量華若以一香至無量香若以一偈讚至無量偈若以一禮至無量禮若遶一帀至無量帀若一時中乃至無量時中若自獨作若共人作善男子若能如是至心供養佛法僧者若我現在及涅槃後等無差別涅槃經云若於佛法供養一香燈乃至獻一華則坐不動國善守佛僧物塗掃佛僧地像塔如母指常生歡喜心亦生不動國此則淨土常嚴不為三災所動也不動國即東方阿閦佛國佛告善生若供養僧即是供養佛僧二寶若觀佛法功德微妙即是具足供養三寶若人施時不求果報即是供養無上菩提具足成熟檀波羅蜜修菩提道能得未來無量功德亦能自利及利益他智度論云時佛姨母大愛道以金色上上寶衣奉佛佛勸施僧能消能受故知佛寶僧寶福無多少佛說偈言若人敬愛佛亦當敬愛僧不當有分別同皆為寶故大莊嚴論云眾僧功德海無能測量者佛尚生欣敬自以百偈讚況餘一切人而當不稱歎廣大良福田種少獲大利是故於眾僧耆老及少年等心而供養不應生分別佛告善生善男子若人樂施是人即壞五弊惡法一者邪見二者無信三者放逸四者慳貪五者嗔癡離是惡已心生歡喜因歡喜故乃至獲得真正解脫是人現在得四果報一者一切樂見乃至怨家二者善名流布遍於四方三者入大眾時心無怖畏四者一切善人樂來親附善男子修行施己其心無悔是人若以客煩惱故墮於地獄雖處惡處不饑不渴以是因緣離二種苦一鐵丸苦二鐵漿苦若畜生身所須易得無所匱乏若餓鬼身不受饑渴常得飽滿若得人身壽命色力安樂辯才及信戒施多聞智慧勝於一切雖處惡世不為惡事惡法生時終不隨受於怖畏處不生恐怖若受天身十事殊勝復當深觀貧窮之苦豪貴快樂是故繫心常樂行施善男子若人有財見有求者言無言匱當知是人已說來世貧窮薄德如是之人名為放逸善男子無財之人自說無財是亦不然何以故一切水草人無不有雖是國主不必能施雖是貧窮非不能施何以故貧窮之人亦有食分食已洗器棄蕩滌汁施應食者亦得福德若以塵施於蟻子亦得無量福德果報天下極貧誰當無此塵許耶誰有一日食三揣命不全者是故諸人應以食半食於乞者善男子極貧之人誰有赤裸無衣服者若有衣服豈無一綖施人繫瘡一指許財作燈炷耶善男子天下之人誰有貧窮當無身者如其有身見他作福身應往助歡喜無厭亦名施主亦得福德或時有分或有與等或有勝者以是因緣我受波斯匿王食時亦呪願王及貧窮人所得福德等無差別善男子如人買香塗香末香散香燒香如是四香有人觸者買者量者等聞無異而是諸香不失毫𨤲修施之德亦復如是若多若少若麤若細若隨喜心身往佐助若遙見聞心生歡喜其心等故所得果報無有差別善男子若無財物見他施已心不喜信疑於福田是名貧窮若多財寶自在無礙有良福田內無信心不能奉施亦名貧窮是故智者隨有多少任力施與除布施已無有能得人天之樂至無上樂是故我於契經中說智者自觀餘一揣食自食則生施他則死猶應與之況復多耶善男子智者當觀財是無常是無常故於無量世失壞耗減不得利益雖是無常而能施作無量利益云何慳惜不布施耶智者復觀世間若有持戒多聞持戒多聞因緣力故乃至獲得阿羅漢果雖得是果不能遮斷饑渴等苦若阿羅漢難得房舍衣服飲食臥具病藥皆由先世不施因緣破戒之人若樂行施人是雖墮餓鬼畜生常得飽滿無所乏少善男子除布施已不得二果一者自在二者解脫若持戒人雖得生天不修施故不得上食微妙瓔珞若人欲求世間之樂及無上樂應當樂施智者當觀生死無邊受樂亦爾是故應為斷生死施不求受樂復作是觀雖復富有四天下地受無量樂猶不知足是故我應為無上樂而行布施不為人天何以故無常故有邊故無上樂即無上涅槃樂善男子施物已兼化眾生云何教化見貧窮者先當語言汝歸能依三寶不受齋戒不若言能者先受三歸及以齋戒後則施物若言不能復應語言若不能者汝能隨我說一切法無常無我涅槃寂滅不若言能者當教已便施若能如是先教後施名大施主若以衣施得上妙色若以食施得無上力若以燈施得淨妙眼若以乘施身受安樂若以舍施所須無乏善男子智者施時不為果報何以故定知此因必得果故毗婆沙論云若人一日一夜持不殺戒於未來世決定不逢刀兵災起若以一訶子起殷淨心奉施病僧於當來世決定不逢疾疫災起若一摶之食起殷淨心奉施僧眾於當來世決定不逢饑饉災起是以尊者薄拘羅昔受一不殺生戒得五不死報施病比丘一訶梨勒果九十一劫天上人中享福快樂未嘗有病今最後身出家成阿羅漢年百六十無疾由施僧一果故智度論云一念中能行六波羅蜜謂布施時如法捨財是檀波羅蜜安住大善道中布施不向二乘是戒波羅蜜慳等煩惱及魔等來不能動心是忍辱波羅蜜布施不息是精進波羅蜜攝心不散無疑無悔是禪波羅蜜與者受者乃至財物俱不可得是般若波羅蜜檀者施也又云施有三種一財施二法施三無畏施持戒自檢不侵一切眾生財物是行財施能種種說法令其開悟名為法施眾生畏死持戒不害名無畏施大丈夫論云財施者除眾生身苦法施者除眾生心苦財施者為得身樂法施者為得心樂財施者為眾生所愛法施者為世間所敬未曾有經云施食濟一日之命施財物濟一世之乏說法教化能令眾生出世間道法苑云若以紙墨令人書寫若自書寫如來正典然後施人令得讀誦是名法施如是施者未來世中得成上色壽命延長多饒財寶身得大力安樂獲無礙辯信心明了故知法施殊勝過於財施若聞法施過於財施愚人不解即便秘財唯樂讀經若如是者不如有人解心布施一錢勝如迷心讀經百千萬卷是故如來設教意存解行雙行方成佛果阿毗曇甘露味經云若施畜生受百世報若施不善人受千世報若施善人受千萬世報若施離欲凡夫受千萬億世報若施得道人得無數世報若施佛得至涅槃僧伽吒經云大眾白佛言世尊一佛福德有幾量耶佛言譬如大地微塵如恒河沙等眾生悉成十地菩薩如是一切十地菩薩所有功德不如一佛功德之力優婆塞戒經云若優婆塞常能至寺親近諸比丘等諮問法味至心聽受憶念不忘能分別義轉化眾生是名優婆塞自利利他若不能習學如是所說輕慢比丘為求過失而往聽法無信敬心奉事外道見其功德深信日月五星諸宿是優婆塞不名堅固如法住也若人為護舍宅身命齋祀諸神是人不名失歸依法若人至心信其能救一切怖畏禮拜外道是人即失三歸依法若聞諸天有曾見佛功德勝己禮拜供養是人不失歸依之法或時禮拜天王應如禮拜世間諸王長者貴人耆舊有德之人雖復禮拜所說邪見法慎無受之供養天時當起慈心為護身命財物國土人民恐怖所說邪見何故不受智者應觀外道所說云一切世間萬物皆是自在天之所作若是天所作者我今何故修是善業而一切眾生作善惡業以是業緣自受果報復說一切萬物時節星宿是自在天作如是邪說我云何受智者了了知是業果云何說言時節星宿自在天作耶以是因緣智者不受外道邪錯之說善男子一切眾生隨於業行若修正見受於安樂修邪見者受大苦惱因修善業得大自在得自在已眾生親近復為宣說善業因緣善業因緣故得自在一切眾生皆由修善業因緣故得受安樂非年宿也順正理論云諸天神眾於近事邊無敢希求禮敬如國君主於比丘定無希求禮敬懼損功德及壽命故如契經說北方天王請大目連舍利弗等五百聖僧至自宮中設供養已請施頌願復請曰從今後諸出家者及在家近事等至我廟中一切皆應施我頌願我等眷屬亦從今時專誠護持正法令佛出家在家弟子於一切時恒無惱害時尊者許其請所徧告一切出家在家受佛戒者至天廟中皆應如法施天頌願然未曾有令合掌敬禮若近事樂禮天神便與外道等無差別愛樂邪徒所作業故由此方便習近邪師墮惡趣因漸堅增盛從此展轉乃至多生亦樂如是邪行又若近事禮敬天神引多眾生作大衰損彼事天者皆作是言近事深閑佛教今來禮敬我所事天必於天神有懷敬信善哉我等無倒歸依又世間諸樂正理者推尋佛教未究其真觀此便生僻執謂佛教似世間書傳以不能辯真義理乃令是人還歸依諸天神眾引如是等無量眾生令增邪執名大衰損又非近事繫天神自是邪徒相率歸附非出家人皆應致敬是故近事不應禮敬一切天神優婆塞戒經許近事禮拜天神如禮國君等不得信受其說今順正理論禮敬亦遮天王尚不聽禮況餘諸鬼神今時有信受偽造玉皇寶告三官經七斗經受生經等豈不大錯或曰經雖非真可誘為善寧有過耶答曰豈不聞乎因地不真果招紆曲生生不獲正見過誠非小宜速省之優婆塞戒經云善生白佛言世尊菩薩已受優婆塞戒若有內外諸惡不淨因緣云何得離佛言應修念佛心若有至心修念佛者是人則得離內外惡不淨因緣增長悲慧大般若經云佛告善現菩薩摩訶薩若晝若夜常不遠離念佛作意常不遠離聞法作意由此因緣隨諸國土有諸如來現說正法即乘願力往彼受生或乘神通而往聽法由是因緣此諸菩薩生生之處常不離佛恒聞正法無間無斷無量壽經佛告彌勒於此世界有六十七億不退菩薩往生極樂國一一菩薩已曾供養無數諸佛次如彌勒者也諸小行菩薩及修習小功德者不可稱計皆當往生不但我剎諸菩薩等往生彼國他方佛土亦復如是其第一佛名曰遠照彼有百八十億菩薩皆當往生其第二佛名曰寶藏彼有九十億菩薩皆當往生其第三佛名曰無量音彼有二百二十億菩薩皆當往生其第四佛名曰甘露味彼有二百五十億菩薩皆當往生其第五佛名曰龍勝彼有十四億菩薩皆當往生其第六佛名曰勝力彼有萬四千菩薩皆當往生其第七佛名曰師子彼有五百菩薩皆當往生其第八佛名曰離垢光彼有八十億菩薩皆當往生其第九佛名曰德首彼有六十億菩薩皆當往生其第十佛名曰妙德山彼有六十億菩薩皆當往生其第十一佛名曰人王彼有十億菩薩皆當往生其第十二佛名曰無上華彼有無數不可稱計諸菩薩眾皆不退轉智慧勇猛已曾供養無量諸佛於七日中即能攝取百千億劫大士所修堅固之斯法等菩薩皆當往生其第十三佛名曰無畏彼有七百九十億大菩薩眾諸小菩薩及比丘等不可稱計皆當往生佛語彌勒不但此十四佛國中諸菩薩等當往生也十方世界無量佛國其往生者亦復如是甚多無數我但說十方諸佛名號及菩薩比丘生彼國者晝夜一劫尚未能盡我今為汝略說之耳唐慈愍三藏法師躬往天竺尋求梵本訪善知識深厭閻浮乃自惟曰何國何方有樂無苦何法何行能速見佛徧問天竺三藏學者皆讚淨土合於金口愍聞已頂受漸至北天竺徤䭾羅國王城東北有一大山山有觀音像愍遂七日叩頭祈請以斷食畢命為期至七日夜觀音空中現紫金色相垂右手摩愍頂曰汝若傳法自利利他惟有西方阿彌陀佛國勸令念佛誦經迴願往生到彼國已見佛及我自當知淨土法門勝過諸行說已忽然不現又唐法照法師大歷二年止衡州雲峰寺慈忍戒定為時所宗忽於一日鉢內兩次現五色雲雲中見有梵剎題曰大聖竹林寺後詣五臺見異光果得竹林寺方圓可二十里一百二十院皆是寶塔莊嚴其地純是黃金流渠華樹充滿其內照入寺至講堂見文殊在西普賢在東各據師子之座萬眾圍繞而為說法照作禮問曰末代凡夫去聖時遙知識轉劣垢障尤深佛法浩瀚未審修何法門最為捷要文殊告曰諸修行門無如念佛我以念佛得一切種智是故一切諸佛法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛是諸法之王汝當念無上法王令無休息照復問當云何念文殊曰此世界西有阿彌陀佛彼佛願力不可思議汝若繫念令念無間斷決定往生永不退轉說是語已二大聖各舒金色手摩照頂為授記照歡喜禮謝而退念佛徃生法門如大小彌陀經無量壽經觀經等及諸淨土典籍廣明
