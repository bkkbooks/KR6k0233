body:
  text: 東鼎湖山沙門釋弘贊在犙輯受八戒齊法僧祇律云佛告諸比丘今是齊日喚優婆塞淨洗浴著淨衣受布薩增一阿含經云佛告優婆塞當於八日十四日十五日往詣長老比丘所一一受八戒一一受之勿令失次優婆塞戒經云若優婆塞受持五戒已一月之中不能六日受持八戒供養三寶得失意罪故懺法云月無六齊懶墯之業灌頂經云雖持五戒具足不於六日持八戒齊猶華樹無果婦人不産種穀不滋治生無利折耗失本更無衣幘不持齊戒無利如是優婆塞戒經云佛告善生長者若有從他三受三歸三受八戒是名得具一日一夜優婆塞齊明相出時則失是故不得佛像邊受要當從人根本清淨受已清淨莊嚴清淨覺觀清淨念心清淨求報清淨是名三歸清淨齊法若能如是歸依受八戒者除五逆罪餘一切惡悉皆消滅若有難言何緣五戒盡形壽受八戒齊法一日一夜當言如來善知法相通達無礙作如是說又如人重病要須衆藥和合治之若少一種則不能治何以故其病重故一切衆生亦復如是具諸惡故要衆戒然後治之若少一戒則不能治大方便經云受八齊法應言一日一夜不殺等令言語決絶莫使與終身戒相亂也問曰受八戒法得二日三日乃至十日一時受不答曰佛本制一日一夜戒不得過限若有力能受一日過已次第更受如是隨力多少不計日數夫受齊法必從他人邊受於何人受五衆邊受婆沙論問曰近住律儀云何而得答曰從他教得謂隨師教自發誠言恭敬受得又受戒者要隨師語如師語而說方得受若先自發言或與師俱說不得律儀問曰著何服飾受此律儀答曰常所受用衣服嚴具著之皆得受若為暫時莊嚴身者必須棄捨方受此戒受時應齊一晝夜不增不減謂清旦時從師受得至明清旦律儀便捨問曰若至午後受此戒者亦得戒不答曰應言不得除先要期月八日等恆受齊戒彼有餘緣午前不憶食已方憶深生慚愧即請戒師如法受者亦得薩婆多論云夫受齊戒要從他受必無授者但心念口言自歸三寶我持八戒亦得準此必無戒師或師不識戒相方聽自受若近處有師心生慢惰不往從受而自受者亦不得戒如俱舍論云若不恭敬不發律儀若不如法受者但生妙行不發律儀增一阿含經云若受八關齊先須懺悔前罪然後受戒應如是懺悔言我某甲從無始生死已來至於今日身業不善殺盜淫口業不善妄言綺語兩舌惡口意業不善貪欲瞋恚愚癡邪見如此衆罪今向十方諸佛諸大菩薩得道賢聖現前師僧求哀懺悔三懺已教作如是受言我某甲歸依佛歸依法歸依僧一日一夜為淨行優婆塞女人即云優婆夷如來至真等正覺是我世尊三說次受三結我某甲歸依佛竟歸依法竟歸依僧竟一日一夜為淨行優婆塞如來至真等正覺是我世尊三說已次受戒相如諸佛盡壽不殺生我某甲一日一夜不殺生如諸佛盡壽不偷盜我某甲一日一夜不偷盜如諸佛盡壽不淫欲我某甲一日一夜不淫欲如諸佛盡壽不妄語我某甲一日一夜不妄語如諸佛盡壽不飲酒我某甲一日一夜不飲酒如諸佛盡壽不著香華鬘不香塗身我某甲一日一夜不著香華鬘不香塗身如諸佛盡壽不歌舞倡伎不往觀聽我某甲一日一夜不歌舞倡伎不往觀聽如諸佛盡壽不坐高廣大牀我某甲一日一夜不坐高廣大牀如諸佛盡壽不非時食我某甲一日一夜不非時食阿含經云如上次第授已當教發願智度論云當發願言我某甲受行八戒隨學諸佛名為布薩願持是福不墮三惡八難亦不求輪王梵王世界之樂願斷諸煩惱逮得薩雲若成就佛道若欲兼報四恩求生淨土者當作如是發願言我今以此八關戒齊功德四恩總報三有齊資普與衆生同生淨土梵網經云衆生受佛戒即入諸佛位位同大覺已真是諸佛子增一阿含經云若男子女人欲得八關齊離諸苦者得盡諸漏入涅槃城當求方便成此八齊人中榮位不足為貴天上快樂不可稱計欲求無上之福者當求此齊欲生六欲天色無色界天者當持此齊欲求一方二方三方四方天子轉輪聖王位者亦獲其願欲求聲聞緣覺佛乘者悉成其願吾今成就由其持戒八戒十善無願不獲大論問云五戒一日戒何者為勝答曰有因緣故二戒俱等但五戒終身持八戒一日持又五戒常持時多而戒少一日戒時少而戒多若無大心雖復終身持不如有大心持一日戒譬如軟夫為將雖復將兵終身卒無功名若英雄奮發禍亂立定一日之勳名蓋天下八戒比於餘戒亦復如是成實論云八戒優婆塞者秦言善宿男是人善心離破戒宿故諸經論中或名清信士或言近佛男或云近住男優婆夷則云清信女近佛女也報恩經云若破八戒中重戒後更受八戒或受五戒或受十戒或受大戒及禪戒無漏戒一切不得此中戒相持犯如前五戒中說唯五戒制離邪淫此中全斷淫欲為異後之三戒不著香華鬘不香塗身者謂不以諸華貫之為鬘名香為末塗飾薰佩及莊嚴衣具等不歌舞倡伎不往觀聽者謂不自習歌曲戲舞作諸妓樂樗蒲圍棋等及他人作時亦不往觀聽不坐高廣大牀者謂不坐臥過限嚴麗莊校牀座等如阿含經云牀梐下足高尺六非高濶四尺非廣長八尺非大越此量者方明高廣大牀此是周尺復有八種牀初四約物辨貴體不合坐下四約人辨大縱令地鋪擬於尊人亦不合坐一金牀二銀牀三牙牀四角牀五佛牀六辟支佛牀七羅漢牀八師僧牀不非時食者謂不過日中噉嚼五穀瓜果等若日過西一線即名非時經云諸天早食佛日中食畜生日西食鬼神夜食今受八戒斷六道因學佛中食以表中道離二邊過故食訖須嚼楊枝淨水潄口去中餘津若不嚼楊枝口中餘津尚存即犯非時如無楊枝除毒樹一切桃槐苦澀等樹皆可用之今此八戒諸經論中或名八關齊戒或名八齊戒或名八支戒以第六第七戒合為一支謂同於莊嚴處轉故名八支或名八種長養功德法名雖不一而戒則同謂以前八法名為關戒後一不非時食名之為齊關謂關閉八惡不起諸過齊以齊中為義即是禁止八惡令修中道也復有釋云齊者齊也謂禁止六情不染六塵齊斷諸惡具修衆善故名齊也大方便經云優波離白佛言夫八齊法通過中不食乃有九法何以八事得名答曰齊法過中不食為體八事助成齊體共相支持名八支齊法是故言八齊不云九也成實論云何故正離八事耶謂此八是門由此八法離一切惡是中四是實惡飲酒是衆惡門餘三是放逸因緣是人離五種惡是福因緣離餘三種是道因緣婆沙論問曰八支律儀幾是尸羅支幾是不放逸支幾是遠離支答曰五是尸羅支謂離害生命乃至離飲酒一是不放逸支謂離非時食餘二是遠離支又前四是尸羅支離性罪故第五是不放逸支雖受尸羅若飲諸酒心便放逸不能護故後三是遠離支以能隨順厭離心故厭離能證律儀果故此之八戒名近住律儀謂近阿羅漢住以受此律儀隨學彼故或名長養長養在家善根令近出家善根住故此近住律儀或有根本業道淨而近分不淨如自在者受此戒者有厨人欲殺生命擬充所食彼便告曰我今受戒不得殺生留待明朝殺充所食如刑戮等亦爾如是名為根本業道淨而近分不淨世尊說彼所受戒雖是勝業而不獲大果或有根本業道淨而近分亦淨而惡尋思之所損害謂欲尋思瞋尋思害尋思世尊說彼所受戒雖是勝業而不獲大果或有根本業道近分俱淨非惡尋思之所損害而不攝受正念謂六隨念佛法僧戒施天世尊說彼所受戒雖是勝業而不獲大果或有根本俱淨非惡尋思攝受正念而不回向解脫為求生天欲樂等故受持戒世尊說彼所受戒雖是勝業而不獲大果若有根本業道淨乃至回向解脫世尊說彼所受戒是殊勝業能獲大果由此應知隨心優劣所獲報殊當發大心以求勝果故八長養功德經受戒已發願言我持戒行莊嚴自心令心喜悅廣修一切相應勝行求成佛果究竟圓滿復說偈曰我發無二最上心為諸衆生不請友勝菩提行善所行成佛世間廣利益願我乘是善業故此世不久成正覺說法饒益於世間解脫衆生三有苦優婆塞戒經云若有人以四大寶藏滿中七寶持布施人所得功德不如有人一日一夜受持八戒得無量果報至涅槃樂彌勒出時百年受齊不如今日五濁世中一日一夜持齊無量壽經佛言汝等廣植德本布恩施惠勿犯道禁忍辱精進一心智慧轉相教化為德立善正心正意齊戒清淨一日一夜勝在極樂世界為善百歲齊法經云譬如天下十六大國滿中衆寶不可稱說不如一日受佛齊法比其福者十六大國為一豆耳雜譬喻經云一日持齊有六十萬歲糧非時不食復有五福一少病二身安三少淫四少睡五生天識宿命墮舍迦經云月八日十四日十五日二十三日二十九日三十日奉持八齊一日一夜福不可計若賢善人急欲得阿羅漢道若佛道者生天者端其心一其意一月十五日或二十日受齊大善大智度論云若十二月一日至十五日受持此戒其福最多此是如來現大神通日也問曰何故六日受八戒修福德答曰是日鬼神逐人欲奪人命疾病凶衰令人不吉以劫初聖人教人持齊修善治福以避凶衰是時齊法不知受八戒直以一日不食為齊後佛出世始教一日一夜如諸佛受持八戒過中不食是功德將人至涅槃樂四天王經中佛說月六齊日天使者太子及四天王自下觀察衆生不布施持戒孝順父母者便上忉利天以啓帝釋帝釋諸天心皆不悅說言修羅種多諸天種少若布施持戒孝順多者諸天歡喜說言天衆增益修羅減損涅槃經云佛告大王波羅奈國有屠兒名曰廣頞於日日中殺無量羊見舍利弗即受八戒經一日一夜以是因緣命終得為北方天王毗沙門子如來弟子尚有如是大功德果況復佛也賢愚經云阿槃提國中有一老婢晨夜走使不得安處小有違失便受鞭捶衣不蔽形食不充口年老困悴思死不得持瓶詣河取水思惟是苦舉聲大哭時迦旃延尊者來至其所問言何以悲泣懊惱乃爾白言尊者我既年老恆執苦役加復貧窮衣食不充思死不得以故哭耳尊者言汝若貧者何不賣貧婢言貧那得賣誰當買貧尊者言貧實可賣如是至三婢言苟貧可賣我宜問方大德貧云何賣尊者言審欲賣者一隨我語答言諾尊者告言汝先洗浴洗已告言汝當布施白言尊者我極貧困身無手許完納唯有此瓶是大家許當以何施尊者即持鉢與之汝持此鉢取少淨水如教取來奉上尊者尊者受已尋為呪願次教受八戒齊後教念佛種種功德問言汝有住止處不答言無也若磨時即磨下臥舂炊作使即臥其中或時無作止宿糞堆尊者言汝好持心恭謹走使莫生嫌恨自伺大家一切臥竟密開其門於門曲內敷淨草坐思惟觀佛莫生惡念時老婢奉教歸家依敕施行於後夜中即便命終生忉利天大家蚤起見婢命終瞋曰此婢恆常不聽入舍今暮何故乃於此死即使人草索繫腳拽至林中此女既生天上與五百天子娛樂時舍利弗在忉利天問言汝因何福生此天中答言不知舍利弗借其道眼觀見故身生天因緣由迦旃延即將五百天子來至林中散華燒香供養死尸諸天光明照曜村林大家見變怪其所由與衆詣林觀看見諸天子供養此尸即問天曰此婢醜穢生存之時人猶惡見況今已死何故諸天而加供養時天子具說本末生天因緣即皆回詣迦旃延所尊者為諸天人廣說妙法所謂施戒生天之論欲不淨法出離為樂時彼天及五百天子得須陀洹果飛還天宮時在會衆聞法已各獲道迹乃至四果莫不歡喜奉行迦旃延以天眼觀見此婢餘有一夜命在死即墮落地獄受無量苦故往度之法句喻經云東方有國名多羅波提有婆羅門五百人相率欲詣恆水邊三祠神池沐浴垢穢裸形求仙路由大澤迷不得過中路乏糧遙見一大樹如有神氣想有人居馳趣樹下了無所見舉聲大哭云饑渴委厄窮死斯澤樹神現身問曰道士那來今欲何行同聲答曰欲詣神池澡浴望仙今日饑渴幸哀矜濟樹神舉手百味飲食從手流溢給衆飲食皆得飽滿其餘飲食足供路糧臨別詣神請問曰本行何德致此巍巍神曰吾本所居在舍衛國時國大臣名曰須達飯佛衆僧於市買酪無提酪者倩我提之住到精舍使我斟酌訖行澡水儼然聽法一切歡喜稱善無量時我奉齊暮還不餐婦怪問我不審何恨我曰不恨也見長者須達飯佛請我奉齊齊名八關時婦瞋忿言曰瞿曇亂俗奚足採納君毀遺則禍從此興踧迫不已便共俱食時我壽盡神來生此為此愚婦破我齊法不卒其業來生斯澤作此樹神提酪之福手出飲食若全齊法應生天上封受自然即為五百人而說頌曰祠祀種禍根日夜長枝條唐苦敗身本法齊度世仙按賢愚經及百緣經云昔迦葉佛滅度之後遺法垂末有二梵志到比丘邊俱受八戒一願生天一願作國王願生天者歸家婦呼共食夫言向受佛齊過中不食婦曰君是梵志自有戒法何緣乃受異道之齊今若相違不共我飯當以斯事語諸梵志擯汝不與會同夫聞恐怖便與婦非時而食由破齊故後生龍中其願作王者持齊完具得生王家作大國王時王園中多有甘果守園之人日日奉送其人後時於園泉中得一異奈色香甚美便作是念我每出入常為門監所遮當以此奈與之門監得已奉貢黃門黃門納竟轉上夫人夫人得奈復用獻王王食此奈甚覺甘美便問夫人展轉相推到守園人王即喚來而責之曰如此美奈何為不送乃與他人園人於是具陳本末王瞋語言自今以後常送斯奈園監啓王此奈無種何由可辦王曰若不能得當斬汝身其人還園舉聲大哭其龍先身與王共受齊故生於王園泉中時龍變身為人從泉而出問其哭由園監具說龍聞入水以金盤盛奈出泉遣持奉王并說吾意云吾及王本是親友昔在世時俱為梵志共受八戒各求所願汝戒完具得為人王吾戒不全故生龍中今欲奉八關齊法求捨此身當為吾覓八關齊文持來與我若其相違吾覆汝國用作大海園監以奈奉王具說龍意王聞甚憂良由時世無佛法又滅盡齊文難得有一大臣王敕之曰龍索齊法仰卿得之若不得者吾當殺卿大臣歸家甚懷憂惱臣父見子面色不悅問知委由其父語曰吾家堂柱每放光明試破看之必有異事尋即破之得經二卷一是十二因緣二是八關齊文得已奉王王得歡喜自送與龍龍得此經便用好寶贈王王及於龍重修八戒壽盡生天同共一處至釋迦如來出世從天來下至於佛所佛為說法時二天子俱得須陀洹果還歸天上從是已往畢得涅槃按此八戒無論已受五戒未受五戒皆得受之或六齊日自誕日或父母生日諱日等皆可受持以資福慧為出世之基菩薩處胎經云八關齊戒者是諸佛之父母謂由出生諸佛故也若受戒已或遇破戒難緣相逼寧可捨戒已然後作之不得犯戒罪後還得受戒欲捨戒時無問出家在家人邊但向一人言我今捨八戒不持一說即成捨三歸音釋如來乘如實道來成正覺故名如來佛梵音具云佛陀此云覺功成妙智道登圓覺故名為佛蓋窮理盡性大覺之稱也覺具三義謂自覺覺他覺行圓滿肇法師曰生死長夜莫能自覺自覺覺他者其為佛也福慧具足金身丈六三十二相八十種好巍巍堂堂衆聖之師四生之慈父也世尊佛有無量德亦有無量名今以十號德具為物欽重天上人間所共尊故故曰世尊音炒熬米麥磨為粉屑也三昧此云正定僧梵音具云僧伽此云衆謂清淨和合衆乃四比丘已上之稱受持如來二百五十大戒所謂禁戒守真威儀出俗故名僧也呵梨勒此云天主持來此果為藥功用至多無所不入俗名訶子五比丘一憍陳如二馬勝三跋提四婆敷五拘利四諦法輪苦集滅道也阿羅漢此云無著亦云不生又名應真謂一切煩惱斷盡於後世中不受生死果報應受一切人天供養故耶舍伽此云寶稱舍利弗此云身子目犍連此云采菽氏二人共領五百門徒從佛出家俱成阿羅漢三迦葉一優樓頻螺迦葉二伽耶迦葉三那提迦葉此三兄弟領一千徒弟俱從佛出家成阿羅漢須跋陀羅此云善賢年一百二十歲聞佛涅槃來至佛所聞法悟道出家成阿羅漢梵志梵語婆羅門此云淨行亦云梵志梵者淨也謂是梵天之苗裔唯天竺國有餘國所無其種別有經書世世相承以道學為業如此方儒宗或出家或在家多恃己道術我慢人也四不壞信歸依三寶并正法也釋迦文梵語釋迦此云能文是此方之言義名能儒亦名能仁是姓也號牟尼此云寂默三世佛三世者過去未來現在五分所成一戒二定三慧四解脫五解脫知見佛以此五法成身即五分法身學無學學即初果二果三果聖人有餘煩惱尚須學斷故名為學四果阿羅漢煩惱斷盡故名無學貝葉梵語貝多此云岸形其葉長廣其色光潤凡所書寫皆采用之三藏聖教經律論十二部經一契經二重頌三授記四孤起五無問自說六因緣七譬喻八本事九本生十方廣十一未曾有十二論義三智一一切智謂於一切內外諸法能知能解是聲聞緣覺之智二道種智謂用諸佛一切道法發起衆生一切善根是菩薩之智三一切種智謂能以一種智知一切諸佛之道法知一切衆生之因種此是佛智也三諦三者空假中也諦者審也謂諦審一切法即空即假即中即空是真諦真即真空泯一切法之謂也即假是俗諦俗即世俗立一切法之謂也即中是中諦中即中正統一切法之謂也三乘一菩薩二緣覺三聲聞七衆一比丘二比丘尼三式叉摩那四沙彌五沙彌尼六優婆塞七優婆夷四向須陀洹向斯陀含向阿那含向阿羅漢向四得四果聖人六神通神名天心通名慧性天然之慧徹照無礙故名神通一天眼通二天耳通三知他心通四宿命通五神足通六漏盡通世間八法一利二衰三毀四譽五稱六譏七苦八樂五德離身亦名五衰相一寶衣垢穢二寶冠華萎三腋下汗流四身體臭穢五不樂本座天帝釋梵語釋提桓因此云能天主謂能為三十三天主也姓憍尸迦忉利天梵語忉利此云三十三是欲界第二天居須彌山頂四面各有八天帝釋居中共為三十三也阿惟越致此云不退轉證無生法忍菩薩乃得不退轉地毗婆尸此云勝觀鬻音欲賣也南無此云歸依歸是反還之義謂反邪歸正也依是依憑謂憑三寶得出三塗及三界故亦云歸命謂心馳散六塵令舉自命根還歸本源故曰歸命又舉自身命歸投三寶即以三寶為所歸所歸以救護為義如大方便經云譬如人有罪於王投向異國以求救護異國王言汝求無畏莫出我境莫違我教必相救護衆生亦爾繫屬於魔有生死罪歸向三寶以求救護若誠心三寶更無異向不違佛教魔王邪惡無如之何摩尼此云離垢即如意珠寶也涅槃此云圓寂德無不備謂之圓障無不盡謂之寂舊云不生不滅乃三乘聖人所證者阿修羅此云非天亦云無端正男醜女端正故宮殿園林七寶所成居大海底常與天鬬摩竭魚此云鯨魚眼如日月齒如白山口如赤谷所謂吞舟魚也毗尼此云善治謂自治貪瞋癡亦能治衆生之惡即律藏也阿毗曇此云無比法即論藏也阿含此云教亦云法歸謂萬法之淵府總持之林苑乃大小乘教之通號而小乘中別出四部一增一阿含二長阿含三中阿含四雜阿含阿鼻地獄亦云阿毗此云無救亦云無間罪人在中一劫受苦不可救而無彈指頃息苦故在贍部洲下第八重縱廣八萬由旬一人多人皆遍滿其中阿難此云慶喜是佛從弟出家侍佛為傳燈二世祖南贍部洲此云勝金洲其土南狹北廣縱廣七千由旬居須彌山南舍利三乘聖人身骨皆名舍利西牛貨洲彼土多牛以牛為貨故其土縱廣八千由旬形如滿月居須彌山西東勝身洲勝南贍部洲故其土東狹西廣形如半月居須彌山東北俱盧洲此云勝處其土方正縱廣一萬由旬居須彌山北辟支佛此云緣覺悟十二因緣得道中乘聖人十善身不殺盜淫口不妄言綺語兩舌惡口意不貪瞋邪見沙彌此云求寂男出家稟受十戒沙彌尼此云求寂女受持十戒式叉摩那此云學法女於二年中修學六法然後受比丘尼戒比丘尼此云乞士女稟受三百四十八戒比丘此云乞士外以乞食資身福利檀越內以乞法資心而長慧命稟受二百五十大戒五戒音釋至真等正覺如來斷盡一切煩惱令身口意清淨無染無著無虗妄故名至真以一切平法開覺一切衆生成無上覺故名等正覺三惡道亦名三塗謂地獄餓鬼畜生自在天梵語婆舍跋提此言他化自在謂奪他所化而自娛樂別行疏云是欲界頂天假他所作以成己樂即魔王也若大自在天則居色界頂字威靈帝阿耨多羅三藐三菩提此云無上正等正覺乃諸佛所證之道三十六失善惡所起經云飲酒三十六過一資財散失二現多疾病三因與鬬諍四增長殺害五增長瞋恚六多不遂意七智慧漸寡八福德不增九福德轉減十顯露祕密十一事業不成十二多增憂苦十三諸根暗昧十四毀辱父母十五不敬沙門十六不信婆羅門十七不尊敬佛十八不敬僧法十九親近惡友二十捨離善友二十一棄捨飲食二十二形不隱密二十三淫欲熾盛二十四衆人不悅二十五多增語笑二十六父母不喜二十七眷屬嫌棄二十八受持非法二十九遠離正法三十不敬賢善三十一違犯過非三十二遠離圓寂三十三顛狂轉增三十四身心散亂三十五作惡放逸三十六身謝命終墮大地獄受苦無窮五陰色受想行識五欲色聲香味觸也又財色名食睡亦名五欲五蓋一貪欲二瞋恚三睡眠四掉悔五疑蓋也五神通如上六神通除漏盡通五道一天二人三地獄四餓鬼五畜生黠慧上音轄堅慧也閻羅王此云雙王地獄主也贍部洲下過五十那由他是其住處伊羅鉢龍王伊羅鉢此云臭氣樹名也此龍迦葉佛時作比丘因折此臭樹葉遂墮龍中頭上生此臭樹受大苦惱因以為名四等果人一須陀洹果二斯陀含果三阿那含果四阿羅漢果四禪初禪定二禪定三禪定四禪定梵語禪那此云靜慮四空定一空處定二識處定三無所有處定四非非想處定阿那般那此云出息入息即數息觀也酒澱音電橫罹音離遭也一天下即南贍部洲也果蓏音裸在木曰果在地曰蓏即蔓生者旃陀羅此云屠者即屠殺手摴蒱上音樞下音蒲老子入胡作今人擲之為戲泥犁此云無有謂無有喜樂或言無赦處即地獄也暖法如人以木鑽火火雖未出先得暖相譬行者修四諦觀以定資慧加功用行以智慧火燒煩惱薪雖未得無漏之智已得智火前相故名暖法若觀行轉明善根無退見道即證須陀洹果檀波羅蜜梵音檀此云施波羅蜜此云到彼岸揣音團四天下即四大部洲頌願即經中佛所說偈呪願於彼令得善利如有頌云世間五欲樂或復諸天樂若比愛盡樂千分不及一由集能生苦因苦復生集八聖道能超至妙涅槃處所謂布施者必獲其義利若為樂故施後必得安樂八戒音釋布薩此云淨住又云天語淨住人語或云精進亦云長養通僧及俗俱稟修行所謂淨身口意如戒而住也八日十四日十五日此以上半月下半月各三日言之下半月二十三日即上半月初八日二十九三十日即上半月十四十五日此名六齊日尸羅此云清涼即戒之別名謂能持戒則貪瞋癡諸煩惱得清涼故明相出時謂日未出前二刻也又云觀見手掌文時五衆即出家五輩一比丘二比丘尼三式叉摩那四沙彌五沙彌尼三惡八難三惡即三惡道八難者前三即三惡道四長壽天壽五百劫外道得無想定故生其處五北俱盧洲六盲聾瘖啞七世智辨聰謂世人邪智聰利耽習外書不信出世正法八生在佛前佛後此八者皆不得見佛聞法故稱為難也輪王輪王有四金輪王化被四洲銀輪王則政隔北俱盧洲銅輪王則除北俱盧及西牛貨洲鐵輪王則唯贍部洲此四輪王將即大位隨福所感有大輪寶浮空來應則感有金銀銅鐵之異故為四焉梵王居色界初禪二禪中間統小千界薩雲若此云一切智相因名般若果名薩雲若四恩一父母恩二衆生恩謂無始劫來一切衆生輪回六道於多生中互為父母故三國王恩四三寶恩三寶是良福田能令衆生出生死苦至涅槃樂三有謂欲界色界無色界衆生有生有死故也六欲天一四王天二忉利天三夜摩天四兜率天五化樂天六他化自在天色無色界天色界即四禪天無色界即四空天聲聞修四諦法證得小乘四果緣覺梵名辟支佛如前釋鬘音曼貫花以嚴身首也五濁惡世一衆生濁謂諸衆生不畏惡業果報不修善法二見濁謂邪見增盛不修善道三煩惱濁謂諸衆生多諸愛欲貪瞋癡盛惱亂心神四命濁謂人壽轉減百歲者稀以惡業增故三十二十十歲壽數長短不定五劫濁謂刀兵饑饉疾疫三災起時衆生更相殺害也迦旃延此云文飾亦云不定四果即上四果等人菩薩梵語具云菩提薩埵今人尚略故云菩薩菩提佛道也薩埵此云大心衆生謂有大心入佛道也又薩埵名成衆生謂用佛道成就衆生也
