body:
  text: 歸戒序夫三寶者性相常住體周法界接物應機如日曜於千江為世舟航非三畏之可比故其始心入道首則歸依三寶受不殺盜淫妄酒戒似儒教仁義禮智信之五常然五常慶在一生五戒功歸多劫故云五戒不持人天路絶如來三十二相皆從持戒而得苟不持戒尚不得疥癩野干之身況得功德之體若能持戒現獲名稱終超有頂是故現見奉戒去殺不徇仁而仁自著持戒離盜不崇義而義自敷守戒除淫不修禮而禮自立遵戒息妄不期信而信自成受戒斷酒不履智而智自明夫斯之實可謂振網持綱萬目開張破無明殼出長夜夢復何功可以加之何德可以配之若不是修昧於所欲徒役慮于名形勞心乎百氏倦形神於宵夜虛耳目於良晨何乖道之遠逝而弗及者乎得其本則無欲而不辦去其實則何從以措心是以梵志捨異學而歸投三尊菩薩奉禁戒而位同大覺如斯之教孰得而思議哉時康熙癸卯仲夏鼎湖山比丘弘贊識
