body:
  text: 粵東鼎湖山沙門釋弘贊在犙輯受三歸法按四分律如來於菩提樹下成等正覺已結加趺坐七日不動受解脫樂過七日已從定而起未有所食時有賈客兄弟二人一名瓜二名憂波離餘經云一名提謂二名波利將五百乘車載財寶去樹不遠而過樹神勸令以蜜奉獻如來二人聞已歡喜即持蜜奉獻如來佛慈愍故受已即勸喻而開化之告曰汝等賈人今可歸依佛歸依法即受教言大德我今歸依佛歸依法是為優婆塞中最初受二歸依時二人白佛言我今還本生處當云何作福禮敬供養世尊即與髮爪令持歸作福禮敬供養時未有僧故受二歸餘經云佛教言汝當歸依僧未來有僧故二人是雪山西縛喝國之城人承如來命請髮歸國各於二城建一塔供養此是釋迦如來最初之塔也普曜經云佛授二人記當來作佛號曰蜜成如來時世尊食蜜已結加趺坐七日不動遊解脫三昧而自娛樂過七日從三昧起呵梨勒樹神篤信於佛取呵梨勒果來奉世尊佛愍彼故即便受之告言汝今歸依佛歸依法答言如是即歸依佛歸依法諸神受歸依者呵梨勒樹神最初也時佛食果已復入三昧七日從三昧起持鉢入鬱毗羅村乞食時蘇闍羅大將女發歡喜心出食施與佛愍彼故受之告言汝今歸依佛歸依法答言如是我今歸依佛歸依法諸優婆夷受二歸者大將女為最初也時佛詣文驎龍水邊龍王化作少年合掌互跪禮如來足以偈讚佛佛告龍王汝今歸依佛法答言如是我今歸依佛法畜生受二歸者文驎龍王為首爾時世尊受梵天王請轉法輪已往波羅奈國鹿野園中為憍陳如等五比丘三轉四諦法輪心得解脫成阿羅漢是為僧寶人天無上福田後度耶舍伽子舍利弗目犍連三迦葉徒衆共千二百五十人最後涅槃度須跋陀羅於其中間所度者不可勝數故經云佛告阿難如來東方弟子無數億千南西北方弟子無數億千時耶舍伽父往見世尊佛為說法即得須陀洹果白佛言我今歸依佛歸依法歸依僧唯願世尊聽為優婆塞自今以去盡形壽不殺生乃至不飲酒是為最初三自歸耶舍伽父為首時耶舍伽母及妻辦種種飲食奉上世尊佛為說法得須陀洹果白佛言自今已去歸依佛法僧聽為優婆夷自今已去盡形壽不殺生乃至不飲酒是謂最初受三自歸優婆夷耶舍伽母及妻為首大灌頂經云佛在舍衛國與比丘菩薩天龍八部說法時有鹿頭梵志來到佛所稽首作禮白佛言久聞如來名聲遠振今欲捨置異學受三自歸并五戒法佛言善哉梵志汝能捨置餘道歸依我者當自悔過生死之罪其功無量不可稱計梵志言諾受教即淨身口意復作是念唯願世尊施法戒終身奉行不敢毀缺佛言三世諸佛說是戒法汝應諦聽諦受心持念之佛言盡形壽歸命諸佛無上尊盡形壽歸命法離欲尊盡形壽歸命僧衆中尊佛言梵志以三自歸竟是為真正弟子不為邪惡所干嬈也故薩婆多論云以三寶為所歸欲令救護不得侵陵故也華嚴疏云三寶吉祥最勝良緣有歸依者能辦大事生諸善根離生死苦得涅槃樂今欲受者須先教禮三寶及本師釋迦世尊次禮戒師然後受之如智度論正欲受時具修威儀至出家人前戒師為說善惡兩法令識邪正生其欣厭開拓心神然後為授云我某甲盡形壽歸依佛歸依法歸依僧教令三說得屬法已次授三結我某甲盡形壽歸依佛竟歸依法竟歸依僧竟三說當知初三歸依竟即發善法次三結已唯有身口無我屬已故大方便經云三歸以何為性有論言是教無教性受三歸時胡跪合掌口說三歸是名身口也若純重心有身口無教是謂教無教故薩婆多論云若淳重心受具教無教若輕慢心受但有其教無其無教教無教即作無作戒體也此教無教雖云三歸然總該諸戒之體若受三歸但名歸法而無戒法是以論云有所加得歸及戒若無加者有歸無戒故毗尼母論明三歸有五種一翻邪三歸二五戒三歸三八戒三歸四十戒三歸五大戒三歸言大戒三歸者謂佛初度人未制羯磨有受三歸而得大戒者有喚善來而成比丘者制後不得也言翻邪三歸者謂衆生從無始劫來惑業所障不識三寶不知出離或依天神外道或依世教為所歸依今始易心歸投正教翻破邪歸以為入道修因證果之根本故佛令彼先受三歸後始懺悔是名翻邪三歸也然既歸依三寶必須斷惡修善方名佛子豈容仍舊殺盜淫妄而濫稱為優婆塞乎論云並須師教不得自受若師言歸依佛弟子答言爾或言不出口或逐師語不具或不稱己名字或兩國言音不相領解或從一二三人各受一歸並不成歸大方便經云優波離白佛言世尊若受歸戒時先稱法後稱佛者成三歸不答曰無曉知說不次第者自不得罪得成三歸若有所解故倒說者得罪亦不成歸問曰若稱佛及法不稱僧者或稱法僧不稱佛者或稱佛僧不稱法者成三歸不答曰並不成三歸佛以法為師佛從法生法是佛母佛依法住問曰佛若以法為師者於三寶中何不以法為初答曰法雖是佛師而法非佛不弘所謂道由人弘是故以佛在初優婆塞戒經云長者善生白佛言世尊云何名為三歸佛言善男子為破諸苦斷除煩惱受於無上寂滅之樂以是因緣受三歸依如汝所問云何三歸者謂佛法僧佛者能說斷煩惱因得正解脫法者即是煩惱因真實解脫僧者稟受破煩惱因得正解脫或有說言若如是者則是一歸是義不然何以故如來出世及不出世正法常有無分別者如來出世則有分別是故應當別歸依佛如來出世及不出世正法常有無有持者如來出已則有持者是故應當別歸依法如來出世及不出世正法常有無有受者如來出已則有受者佛弟子衆能稟受故是故應當別歸依僧正道解脫是名為法無師獨覺是名為佛能如法受是名為僧若無三歸云何說有四不壞信善男子如佛緣覺聲聞各異是故三寶不得不異何因緣故說佛即法能解是法故名為佛受分別說故名為僧觀有為法多諸罪過獨處修行得甘露味故名為佛一切無漏無為法界故名為法受持禁戒讀誦解說十二部經故名為僧若有說言如來滅已歸依佛者是何歸依善男子如是歸依名為歸依過去諸佛無學之法如我先教提謂長者汝當歸依未來世僧歸依過去佛亦復如是福田果報有多少故差別為三若佛在世及涅槃後供養果報無有差別受歸依者亦復如是若男若女能三說三歸依者名優婆塞優婆夷智者深觀如來智慧解脫最勝能說解脫及解脫因能說無上寂靜之處能竭生死苦惱大海威儀詳序三業寂靜是故應當先歸依佛智者深觀生死之法是大苦聚無上正道能永斷之生死之法渴愛饑饉無上甘露味能充足生死之法怖畏險難無上正法能除斷之生死錯謬邪僻不正無常見常無我見我無樂見樂不淨見淨無上正法悉能除斷以是因緣故應歸依法智者應觀外道徒衆無慚無愧非如法住雖為道行不知正路雖求解脫不得正要雖得世俗微善之法慳吝護惜不能轉說非善行性作善行想佛僧寂靜心多憐愍少欲知足如法而住修於正道得正解脫得已復能轉為人說是故應當次歸依僧若能禮拜如是三寶來迎去送尊重讚嘆如法如住信之不疑是則名為供養三寶受三歸已造作癡業受外道法自在天語以是因緣失於三歸若人質直心無慳貪常修慚愧少欲知足是人不久得寂靜身法身也若有造作種種雜業為受樂故修於善事如市易法其心不能憐愍衆生如是之人不得三歸須達長者教告家內在胎之子悉受歸依是胎中子實不成歸何以故是法要當口自宣說雖不成歸亦能護之善生白言世尊何等之人得三歸依何等之人不得三歸佛言善男子若人信因信果信諦信有得道如是之人則得三歸若人至心信不可敗親近三寶受善友教如是之人則得三歸優婆塞戒亦復如是若能觀是優婆塞戒多有無量功德果報能壞無量弊惡之法衆生無邊受苦亦爾難得人身雖得人身難具諸根雖具諸根難得信心雖得信心難遇善友雖遇善友難得自在雖得自在諸法無常我今若造惡業因是惡業獲得二世身心惡報以是因緣身口意即是我怨設三惡業不得惡報現在之惡亦不應作是三惡業現在能生弊惡色等死時生悔以是因緣我受三歸及八齊法遠離一切惡不善業智者當觀戒有二種一者世戒二者第一義戒若不依於三寶受戒是名世戒是戒不堅如彩色無膠是故我先歸依三寶然後受戒若終身受若一日一夜所謂優婆塞戒八戒齊法夫世戒者不能破壞先諸惡業受三歸戒則能破之何以故戒力勢故大方便經問云為歸依釋迦文佛為歸依三世佛耶答曰歸依三世佛以佛法身同故歸依一佛即是三世諸佛以佛無異故問曰為歸色身為歸依法身耶答曰歸依法身不歸色身不以色身為佛故問曰若色身非佛何以出佛身血而得逆罪答曰色身是法身器故法身所依故若害色身則得逆罪不以色身是佛故得逆罪故薩婆多論云歸依佛者歸於法身謂一切智無學功德五分所成歸依法者歸於自他盡處謂斷欲無欲滅諦涅槃謂自他惑滅所無之處故云盡處歸依僧者歸依第一義諦僧謂良祜福田聲聞學無學功德也報恩經問曰若歸依第一義諦僧者佛與提謂波利受三歸不應言未來有僧汝應歸依第一義諦僧常在世間答曰以俗諦僧是第一義諦僧所依故言未來有僧汝應歸依又欲尊重俗諦故作如是說佛自說一切諸衆中佛衆第一若有衆僧集在是中四向四得無上福田於一切九十六種衆中最尊最上無能及者故言未來有僧汝應歸依不傷正義台教明二種三寶一住持二一體言住持三寶者佛在世時樹下成道為佛寶說四諦法為法寶度五比丘為僧寶佛滅度後範金合土繪畫丹青為佛寶紙書貝葉三藏聖教為法寶剃髮染衣紹隆佛化為僧寶此三住持不絶故曰住持三寶然一切像即是真身經典所在是佛舍利今時凡僧亦能荷負正法為世福田皆應禮敬言一體三寶者即是一心自性不歸無所歸處若以實相慧覺了諸法非空非有亦空亦有雙忘雙照三智圓覺名為佛寶所覺法性之理三諦具足名為法寶如此覺慧與理事和合名為僧寶欲行禮敬者不於一體之外而有住持亦不離住持之相而言一體若昧一體之理而行禮敬但得事善不名真禮若離住持之相而談一體墮斷滅空不名達理以理居事外未知全事即理又豈悟能所性空感應道交者乎由此三寶常住於世不為世法之所陵慢故稱寶也如世珍寶為衆生所重今此三寶為諸群生三乘七衆之所歸仰故名三歸也寶性論云三寶有六義故須敬也一者希有義如世寶物貧窮之人所不能得三寶如是薄福衆生百千萬世不能值遇所名為寶二者離垢義如世真寶體無瑕穢三寶如是絶離諸漏故名為寶三者勢力義如世珍寶除貧除毒有大勢力三寶如是具不思議六神通力故說為寶四者莊嚴義如世珍寶能嚴身首令身姝好三寶如是能嚴行人清淨身故故說為寶五者最勝義如世珍寶諸物中勝三寶如是一切世中最為殊勝故名為寶六者不改義如世真金燒打磨煉不能變改三寶如是不為世間八法所改故名為寶故經云三歸功力最大不得不受昔者天帝釋五德離身自知命盡當下生世間在陶作家受驢胎甚大愁憂自念三界之中濟人苦厄唯有佛耳於是馳往佛所稽首作禮伏地至心三自歸命佛法僧未起之間其命忽出便至陶家驢母腹中作子時驢自解走瓦壞間破壞壞器其主打之尋時傷胎其神即還入故身中五德福還復為天帝佛從定覺讚言善哉天帝能於殞命之際歸命三寶罪對已畢不更勤苦佛為說法天帝歡喜奉受得須陀洹道折伏羅漢經云昔忉利天子壽命垂盡五衰相現自觀終後下生維耶離國疥癩母猪腹中作子愁憂不樂有天語云唯佛能脫卿罪即到佛所作禮未問佛告天子一切萬物皆歸無常汝素所知何為憂愁天白佛言雖知天福不能得久恨離此座常為猪胎以是為毒人趣受身不為恐也佛言欲脫猪身當誦三歸即從佛教晨夜自歸七日壽盡下生維耶離國作長者子在母胞胎日三自歸始生墮地亦跪自歸舉家深怪謂之熒惑意欲殺之唯父識之曰此兒非凡人生百歲尚不曉歸三寶況初墮地能自稱佛好養視之兒年七歲路逢舍利弗目犍連兒便作禮衆咸驚怪兒言道人不識我耶我在天上應生惡道佛授自歸故得為人願以我言請佛及僧兒歸以白父母願辦供養父母異其年幼能發大心喜而營之佛及衆僧神足來應因為說法兒及父母內外親屬皆得阿惟越致乃三自歸之福也賢愚經云阿難白佛言世尊不審此重姓比丘本作何行種何善根而今出世墮水魚吞不死佛告阿難過去久遠有佛出世號毗婆尸為衆說法時有長者子來至會中聞佛說布施持戒之福歡喜信心即從佛受三自歸及不殺戒復以一錢布施彼佛由是之故世世受福財寶自恣無有乏短爾時長者子者今重姓比丘是由其布施一錢九十一劫恆富錢財至於今世二家父母供給所須受不殺戒故墮水魚吞不死受三自歸故今值於我得羅漢道正法經云昔有人受人所鬻斷命祭天既被持縛無所能避唯念諸佛一稱是言南無佛陀耶言已命終生三十三天六十劫中受勝妙樂藥王軍菩薩白佛言此人何緣生彼佛言臨終純善相應發淨信心歸依如來一稱南無佛故是人即為深種善根又復於八十劫中得宿命智在在生處離諸煩惱息一切苦大悲經云一稱南無佛者以是善根入涅槃界不可盡也正法念經云若有衆生修善以清淨心歸佛法僧一彈指頃不生餘心命終生白摩尼天五欲恣情心意悅樂三歸功德乃至報盡於未來世得至涅槃優婆塞戒經云若在家若出家若三歸若八齊若五戒若具足若不具足若一日一夜若一時一念若盡形壽至心受持當知是人得大福德賢愚經云持戒之人寧捨身命終不毀犯何以故戒為道之初基盡漏之妙趣涅槃安樂之平塗若持淨戒計其功德無量無邊譬如大海多有阿修羅黿龜水性摩竭魚等大衆生居戒海亦爾多有三乘大衆生居譬如大海多諸金銀七寶戒海亦爾多出善法有四非常三十七品諸禪三昧如是等寶猶如大海金剛為底金剛山圍四江大河流注其中不增不減戒海亦爾毗尼為底阿毗曇山以圍繞四阿含河流注其中湛然常爾不增不減其海何故注入不增不減以下阿鼻地獄火上衝大海海水消涸以故不增常流入故以故不減佛法戒海不放逸故不增具功德故不減是故當知能持戒者其德甚多如希有校量功德經云爾時長老阿難白佛言若善男子女人能如是言我今歸依佛歸依法歸依僧得幾所功德我實未解願佛演說令諸衆生得正知見佛告阿難吾當為汝解說假使南贍部洲滿中須陀洹人此云入流是初果聖人其有善男子女人滿一百年持於世間一切所有娛樂之具盡給施與復以四事衣食臥具衣藥具足供養恭敬禮拜乃至滅度之後收其舍利起七寶塔以香華妓樂幢幡種種供養於汝意云何得福多不阿難白佛甚多世尊佛言不如有人以淳淨心作如是言我今歸依佛法僧所得功德於彼福德百分不及一千分萬分乃至算數譬喻所不能及佛告阿難假使西牛貨洲滿中斯陀含人此云一來是二果聖人有人滿二百年如前一一供養亦所不及三歸功德假使東勝身洲滿中阿那含人此云不來三果聖人有人滿三百年如前一一供養亦所不及三歸功德假使北俱盧洲滿中阿羅漢有人滿四百年如前一一供養亦所不及三歸功德假使四天下滿中辟支佛有人滿十千年如前一一供養亦所不及三歸功德假使滿三千大千世界中諸佛如來若有人二萬歲中如前一一供養雖得無量無邊不可算數福德猶不如有人以淳淨心作如是言我歸依佛歸依法歸依僧所得功德勝前百倍千倍萬倍不可算數言辭譬類所能知及復告阿難若有人能歸依佛竟歸依法竟歸依僧竟乃至一彈指頃能受十善受已修行以是因緣得無量無邊功德若復有人能一日一夜受八戒齊已如說修行所得功德勝前福德千倍萬倍百千萬倍乃至算數譬喻所不能及若能受持五戒盡其形壽如說修行所得功德勝前福德百倍千倍萬倍億倍非算數譬喻所能知及若復有人受沙彌戒沙彌尼戒復勝於前若復有人受式叉摩那戒復勝於前若復有人受比丘尼大戒依戒修行復勝於前若復有人盡形壽持大比丘戒依戒如說修行不缺不犯無有穢濁清淨梵行得無量無邊功德勝前百倍千倍萬倍百千萬倍乃至算數譬喻所不能及阿難聞說此三歸依處乃至盡壽護大比丘戒功德無量歎未曾有佛告阿難此經名為希有希有經汝當奉行阿難聞佛所說歡喜奉行
